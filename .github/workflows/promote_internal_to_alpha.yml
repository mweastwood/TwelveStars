name: Promote Internal to Alpha

on:
  workflow_dispatch:
  schedule:
    # Runs daily at 00:00 UTC
    - cron: '0 0 * * *'


jobs:
  promote_release:
    name: Promote Release Track
    runs-on: ubuntu-latest

    steps:
      - name: Verify Service Account Secret
        run: |
          if [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT_TWELVE_STARS_PROD }}" ]; then
            echo "ERROR: FIREBASE_SERVICE_ACCOUNT_TWELVE_STARS_PROD is empty or not configured in GitHub Secrets!"
            exit 1
          fi

      - name: Promote Release Track on Google Play
        uses: kevin-david/promote-play-release@v1.2.0
        with:
          service-account-json-raw: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TWELVE_STARS_PROD }}
          package-name: 'com.mweastwood.twelve_stars'
          from-track: 'internal'
          to-track: 'alpha'
